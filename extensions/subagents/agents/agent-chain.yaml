explore-and-code:
  description: "Explore the codebase, then implement the change."
  steps:
    - agent: explorer
      prompt: "Map the codebase for this task. Identify relevant files, line ranges, types, entry points, and any external docs needed.\n\nTask: $ORIGINAL"
    - agent: coder
      prompt: "Using the explorer's findings below, implement the requested change.\n\nExplorer findings:\n$INPUT\n\nOriginal task: $ORIGINAL"

plan-and-code:
  description: "Plan the approach, explore exact code locations, then implement."
  steps:
    - agent: planner
      prompt: "Create an implementation-ready plan for this task. Include files, slices, risks, and verification.\n\nTask: $ORIGINAL"
    - agent: explorer
      prompt: "Map the codebase for this implementation plan. Find exact files, line ranges, types, and external references involved.\n\nPlan:\n$INPUT\n\nOriginal task: $ORIGINAL"
    - agent: coder
      prompt: "Implement the task using the plan and explorer findings below.\n\nPlan and explorer findings:\n$INPUT\n\nOriginal task: $ORIGINAL"

reviewed-code:
  description: "Explore, implement, then critique the result."
  steps:
    - agent: explorer
      prompt: "Map the codebase for this task. Identify relevant files, line ranges, types, entry points, and verification commands.\n\nTask: $ORIGINAL"
    - agent: coder
      prompt: "Implement the requested change using the explorer findings below.\n\nExplorer findings:\n$INPUT\n\nOriginal task: $ORIGINAL"
    - agent: critic
      prompt: "Review the completed implementation for bugs, missed requirements, and verification gaps. Use git diff and relevant files.\n\nImplementation summary:\n$INPUT\n\nOriginal task: $ORIGINAL"
